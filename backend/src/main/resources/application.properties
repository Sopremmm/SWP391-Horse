# Port chạy ứng dụng Backend (Mặc định là 8080)
server.port=8080

# Đường dẫn kết nối đến Microsoft SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=horse_racing_db;encrypt=true;trustServerCertificate=true;

# Tài khoản và mật khẩu đăng nhập SQL Server Management Studio (SSMS) trên máy bạn
spring.datasource.username=sa
spring.datasource.password=12345

# Cấu hình Hibernate JPA để tự động đồng bộ thực thể Java xuống Database
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true