spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost;instanceName=NGUYENTRUNG;databaseName=horse_racing_db;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:change-me}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
