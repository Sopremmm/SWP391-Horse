spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=horse_racing_db;encrypt=true;trustServerCertificate=true;loginTimeout=5
spring.datasource.username=sa
spring.datasource.password=12345
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

server.port=${PORT:8080}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail (Gmail SMTP)
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:}
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Bank Topup (VietQR)
app.bank.code=${APP_BANK_CODE:}
app.bank.account=${APP_BANK_ACCOUNT:}
app.bank.account-name=${APP_BANK_ACCOUNT_NAME:}
app.bank.webhook.secret=${APP_BANK_WEBHOOK_SECRET:}

app.seed.enabled=${APP_SEED_ENABLED:false}
